name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project ValetUI.xcodeproj \
            -scheme ValetUI \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || cat

      - name: Unit Tests
        run: |
          xcodebuild test \
            -project ValetUI.xcodeproj \
            -scheme ValetUI \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || cat

      - name: Build (Release)
        run: |
          xcodebuild build \
            -project ValetUI.xcodeproj \
            -scheme ValetUI \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || cat
