name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    # macos-15 default Xcode is 16+ — required for Swift 6
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      # No xcpretty pipe — `| xcpretty || cat` masked xcodebuild's exit code
      # and let broken builds report green
      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ValetUI.xcodeproj \
            -scheme ValetUI \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ValetUI.xcodeproj \
            -scheme ValetUI \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ValetUI.xcodeproj \
            -scheme ValetUI \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
